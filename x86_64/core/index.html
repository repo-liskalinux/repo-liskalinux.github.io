<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index of /</title>
    <style>
        :root {
            --bg: #1a1a24;
            --surface: #252538;
            --text: #e2e8f0;
            --primary: #3b82f6;
            --border: #334155;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            color: #fff;
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--surface);
            border-radius: 6px;
            overflow: hidden;
        }
        th, td {
            padding: 14px 20px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            background-color: #1e1e2f;
            color: #94a3b8;
        }
        tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }
        a {
            color: var(--primary);
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Index of /linux-repo</h1>
    <input type="text" id="searchInput" placeholder="Search packages (e.g., openssh, kernel)..." autofocus>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Version</th>
                <th>Download</th>
            </tr>
        </thead>
        <tbody id="repoTableBody">
        </tbody>
    </table>
</div>

<script>
    const searchInput = document.getElementById('searchInput');
    const tableBody = document.getElementById('repoTableBody');
    let repoData = [];
    async function loadRepo() {
        try {
            const response = await fetch('db.json');
            repoData = await response.json();
            renderTable(repoData);
        } catch (error) {
            console.error('Error loading db.json:', error);
            tableBody.innerHTML = `<tr><td colspan="4" style="text-align:center;color:#ef4444;">Error loading db.json. Is the file in the same directory?</td></tr>`;
        }
    }
    function renderTable(data) {
        tableBody.innerHTML = '';
        if (data.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="3" style="text-align:center;">No packages found</td></tr>`;
            return;
        }
        data.forEach(pkg => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><strong>${pkg.name}</strong></td>
                <td>${pkg.version}</td>
                <td>${pkg.arch}</td>
                <td><a href="${pkg.url || '#'}" download>Download</a></td>
            `;
            tableBody.appendChild(row);
        });
    }
    searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = repoData.filter(pkg => 
            pkg.name.toLowerCase().includes(query) || 
            pkg.version.toLowerCase().includes(query)
        );
        renderTable(filtered);
    });
    loadRepo();
</script>
</body>
</html>
