<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index of /</title>
    <style>
        :root {
            --bg: #1a1a24;
            --surface: #252538;
            --text: #e2e8f0;
            --primary: #3b82f6;
            --border: #334155;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            color: #fff;
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--surface);
            border-radius: 6px;
            overflow: hidden;
        }
        th, td {
            padding: 14px 20px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            background-color: #1e1e2f;
            color: #94a3b8;
        }
        tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }
        a {
            color: var(--primary);
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Index of /x86_64/</h1>
    <input type="text" id="searchInput" placeholder="Search packages (e.g., openssh, kernel)..." autofocus>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Version</th>
                <th>Download</th>
            </tr>
        </thead>
        <tbody>
            <td><strong><a href="core">core</a></strong></td>
            <td>-</td>
            <td>-</td>
            <td><strong><a href="extra">extra</a></strong></td>
            <td>-</td>
            <td>-</td>
        </tbody>
    </table>
</div>
</body>
</html>
