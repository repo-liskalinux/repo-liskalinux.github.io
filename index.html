<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liska Linux Packages</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
        }
        header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }
        h1 {
            color: var(--accent-blue);
            font-size: 1.8rem;
            margin: 0 0 10px 0;
            font-family: var(--font-mono);
        }
        .subtitle {
            color: #8b949e;
            font-size: 0.95rem;
        }
        .mirror-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 25px;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--accent-green);
        }
        .search-box {
            width: 100%;
            padding: 12px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            margin-bottom: 20px;
            outline: none;
        }
        .search-box:focus {
            border-color: var(--accent-blue);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
        }
        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        th {
            background-color: #21262d;
            color: #8b949e;
            font-size: 0.85rem;
            text-transform: uppercase;
            font-family: var(--font-mono);
        }
        tr:last-child td {
            border-bottom: none;
        }
        tr:hover {
            background-color: #1c2128;
        }
        .pkg-name {
            font-family: var(--font-mono);
            font-weight: bold;
            color: var(--accent-blue);
        }
        .pkg-ver {
            font-family: var(--font-mono);
            color: #8b949e;
        }
        .badge {
            background: #238636;
            color: #fff;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 12px;
            font-family: var(--font-mono);
        }
        a.btn-download {
            color: var(--accent-blue);
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 0.85rem;
        }
        a.btn-download:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>::: Liska Linux Repository :::</h1>
        <div class="subtitle">Binary package mirror for Liska Package Manager (lkpm)</div>
    </header>
    <div class="mirror-box">
        # Add to /etc/lkpm.d/mirrorlist:<br>
        [core]<br>
        https://liskalinux.github.io/packages/
    </div>
    <input type="text" id="searchInput" class="search-box" placeholder="Cari paket (misal: linux, systemd)..." onkeyup="filterPackages()">
    <table>
        <thead>
            <tr>
                <th>Package</th>
                <th>Version</th>
                <th>SHA256</th>
                <th>Download</th>
            </tr>
        </thead>
        <tbody id="packageTable">
            <tr>
                <td colspan="4" style="text-align: center; color: #8b949e;">Loading packages database....</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    let allPackages = [];
    async function fetchPackages() {
        try {
            const response = await fetch('db.json');
            const data = await response.json();
            allPackages = data.packages || [];
            renderTable(allPackages);
        } catch (error) {
            document.getElementById('packageTable').innerHTML = `
                <tr>
                    <td colspan="4" style="text-align: center; color: #f85149;">
                        Failed to load db.json!
                    </td>
                </tr>`;
        }
    }
    function renderTable(packages) {
        const tbody = document.getElementById('packageTable');
        if (packages.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #8b949e;">No package has been found.</td></tr>`;
            return;
        }
        tbody.innerHTML = packages.map(pkg => `
            <tr>
                <td class="pkg-name">${pkg.name}</td>
                <td class="pkg-ver">${pkg.version}</td>
                <td><span class="badge">${pkg.sha256}</span></td>
                <td><a href="${pkg.url}" class="btn-download" target="_blank">Download (.pkg.tar.zst)</a></td>
            </tr>
        `).join('');
    }
    function filterPackages() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allPackages.filter(pkg => 
            pkg.name.toLowerCase().includes(query) || 
            pkg.version.toLowerCase().includes(query)
        );
        renderTable(filtered);
    }
    fetchPackages();
</script>
</body>
</html>
